# Heap for Gradle daemon + AGP tasks (e.g. compressDebugAssets). Large Flutter asset sets need headroom.
org.gradle.jvmargs=-Xmx10g -XX:MaxMetaspaceSize=1024m -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
# Separate heap for Kotlin compiler daemon (avoids OOM / incremental cache issues alongside Gradle).
kotlin.daemon.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
